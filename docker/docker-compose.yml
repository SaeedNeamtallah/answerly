x-app-environment: &app-environment
  DATABASE_URL: postgresql+asyncpg://ragmind:ragmind123@postgres:5432/ragmind
  QDRANT_URL: http://qdrant:6333
  CELERY_BROKER_URL: amqp://minirag_user:minirag_rabbitmq_2222@rabbitmq:5672/minirag_vhost
  CELERY_RESULT_BACKEND: redis://:minirag_redis_2222@redis:6379/0
  CORS_ORIGINS: '["http://127.0.0.1:3000","http://localhost:3000","http://127.0.0.1:3001","http://localhost:3001","http://127.0.0.1:80","http://localhost:80","https://ragmind-web.blackcliff-e3babb5f.uaenorth.azurecontainerapps.io"]'
  PROMETHEUS_BASE_URL: http://prometheus:9090
  GRAFANA_INTERNAL_URL: http://grafana:3000
  GRAFANA_PUBLIC_URL: http://localhost:3000
  GRAFANA_EMBED_ENABLED: "true"
  RAGMIND_SHARED_CONFIG_DIR: /app/uploads/config
  SECURITY_ENGINEER_USERNAMES: ${SECURITY_ENGINEER_USERNAMES:-codex_security_smoke}

x-app-depends-on: &app-depends-on
  postgres:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  redis:
    condition: service_started
  qdrant:
    condition: service_started

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ragmind-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend-next
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    image: ragmind-frontend:local
    container_name: ragmind-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "127.0.0.1:3001:3001"
    restart: always

  # 1. قاعدة البيانات (PostgreSQL + pgvector)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragmind-postgres
    environment:
      POSTGRES_USER: ragmind
      POSTGRES_PASSWORD: ragmind123 # نفس اللي في الـ .env
      POSTGRES_DB: ragmind
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/alembic/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ragmind -d ragmind" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: ragmind-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://ragmind:ragmind123@postgres:5432/ragmind?sslmode=disable
    command:
      - --config.file=/etc/postgres_exporter/postgres_exporter.yml
    ports:
      - "127.0.0.1:9187:9187"
    volumes:
      - ./postgres/postgres_exporter.yml:/etc/postgres_exporter/postgres_exporter.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # 2. Vector Database (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ragmind-qdrant
    ports:
      - "127.0.0.1:6381:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # 3. Message Broker (RabbitMQ)
  rabbitmq:
    image: rabbitmq:4.1.2-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: minirag_user
      RABBITMQ_DEFAULT_PASS: minirag_rabbitmq_2222
      RABBITMQ_DEFAULT_VHOST: minirag_vhost
    ports:
      - "127.0.0.1:5729:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      timeout: 10s
      retries: 5

  # 4. Caching & Task Backend (Redis)
  redis:
    image: redis:7-alpine # نسخة مستقرة للإنتاج
    container_name: redis
    ports:
      - "127.0.0.1:6383:6379"
    volumes:
      - redis_data:/data
    restart: always
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "minirag_redis_2222" ]

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: ragmind-node-exporter
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ragmind-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    depends_on:
      - backend
      - postgres-exporter
      - node-exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.1
    container_name: ragmind-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_ANONYMOUS_HIDE_VERSION: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # 5. الباكند (FastAPI) - إضافة مهمة
  backend:
    build:
      context: .. # بيفترض إن الـ Dockerfile في الفولدر الرئيسي
      dockerfile: docker/backend.Dockerfile
    image: ragmind-app:local
    container_name: ragmind-backend
    env_file: ../.env
    environment: *app-environment
    ports:
      - "127.0.0.1:8000:8000"
    depends_on: *app-depends-on
    volumes:
      - ../uploads:/app/uploads
    restart: always

  # 6. معالج المهام (Celery Worker) - إضافة مهمة
  worker:
    image: ragmind-app:local
    container_name: ragmind-worker
    # أمر تشغيل السلري الخاص بمشروعك
    command: celery -A backend.celery_app worker --loglevel=info -Q default,file_processing
    env_file: ../.env
    environment:
      <<: *app-environment
      PROMETHEUS_MULTIPROC_DIR: /app/uploads/prometheus_multiproc
      CELERY_PROMETHEUS_MULTIPROC_DIR: /app/uploads/prometheus_multiproc
      CELERY_PROMETHEUS_PORT: "9108"
    ports:
      - "127.0.0.1:9108:9108"
    depends_on: *app-depends-on
    volumes:
      - ../uploads:/app/uploads
    restart: always

  scheduler:
    image: ragmind-app:local
    container_name: ragmind-scheduler
    command: celery -A backend.celery_app beat --loglevel=info --schedule=/app/uploads/celerybeat-schedule
    env_file: ../.env
    environment: *app-environment
    depends_on: *app-depends-on
    volumes:
      - ../uploads:/app/uploads
    restart: always

  # 7. بوت التليجرام (اختياري)
  telegram_bot:
    image: ragmind-app:local
    container_name: ragmind-bot
    command:
      - sh
      - -c
      - |
        if [ "$${ENABLE_LEGACY_TELEGRAM_BOT:-0}" = "1" ] && [ -n "$${TELEGRAM_BOT_TOKEN}" ]; then
          exec python -m telegram_bot.bot
        fi
        echo "Legacy Telegram polling bot is disabled; bot service is idle."
        exec sleep infinity
    env_file: ../.env
    environment:
      <<: *app-environment
      API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ../uploads:/app/uploads
    restart: always

volumes:
  postgres_data:
  qdrant_data:
  rabbitmq_data:
  redis_data:
  prometheus_data:
  grafana_data:
