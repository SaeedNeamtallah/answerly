global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: ragmind-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets:
          - qdrant:6333

  - job_name: celery-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:9108
