x-app-environment: &app-environment
  DATABASE_URL: postgresql+asyncpg://ragmind:ragmind123@postgres:5432/ragmind
  QDRANT_URL: http://qdrant:6333
  CELERY_BROKER_URL: amqp://minirag_user:minirag_rabbitmq_2222@rabbitmq:5672/minirag_vhost
  CELERY_RESULT_BACKEND: redis://:minirag_redis_2222@redis:6379/0
  CORS_ORIGINS: '["http://52.188.226.80","http://localhost:8080","http://localhost:3000"]'
  RAGMIND_SHARED_CONFIG_DIR: /app/uploads/config

x-app-depends-on: &app-depends-on
  postgres:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  redis:
    condition: service_started
  qdrant:
    condition: service_started

services:
  # 1. قاعدة البيانات (PostgreSQL + pgvector)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragmind-postgres
    environment:
      POSTGRES_USER: ragmind
      POSTGRES_PASSWORD: ragmind123 # نفس اللي في الـ .env
      POSTGRES_DB: ragmind
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/alembic/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ragmind -d ragmind" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://ragmind:ragmind123@ragmind-postgres:5432/ragmind?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ragmind-qdrant
    ports:
      - "6381:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.1.2-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: minirag_user
      RABBITMQ_DEFAULT_PASS: minirag_rabbitmq_2222
      RABBITMQ_DEFAULT_VHOST: minirag_vhost
    ports:
      - "5729:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      timeout: 10s
      retries: 5

  # 4. Caching & Task Backend (Redis)
  redis:
    image: redis:7-alpine # نسخة مستقرة للإنتاج
    container_name: redis
    ports:
      - "6383:6379"
    volumes:
      - redis_data:/data
    restart: always
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "minirag_redis_2222" ]

  prometheus:
    image: prom/prometheus:latest
    container_name: ragmind-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ragmind-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      # السطرين دول عشان جرافانا تعرف إن فيه ملفات داتا سورس وداشبورد جاهزة
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      # السطر ده بيربط الفولدر اللي فيه ملفات الـ JSON اللي نزلتها بماكينة جرافانا
      - ../backend/monitoring/grafana_data/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  postgres_data:
  qdrant_data:
  rabbitmq_data:
  redis_data:
  prometheus_data:
  grafana_data: