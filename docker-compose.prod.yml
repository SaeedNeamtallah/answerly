version: "3.8"

x-app-environment: &app-environment
  DATABASE_URL: postgresql+asyncpg://ragmind:ragmind123@postgres:5432/ragmind
  QDRANT_URL: http://qdrant:6333
  CELERY_BROKER_URL: amqp://minirag_user:minirag_rabbitmq_2222@rabbitmq:5672/minirag_vhost
  CELERY_RESULT_BACKEND: redis://:minirag_redis_2222@redis:6379/0
  CORS_ORIGINS: '["http://localhost","http://127.0.0.1"]'
  RAGMIND_SHARED_CONFIG_DIR: /app/uploads/config

x-app-depends-on: &app-depends-on
  postgres:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  redis:
    condition: service_started
  qdrant:
    condition: service_started

services:
  # 1. Database (PostgreSQL + pgvector)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragmind-postgres
    environment:
      POSTGRES_USER: ragmind
      POSTGRES_PASSWORD: ragmind123
      POSTGRES_DB: ragmind
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/alembic/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ragmind -d ragmind" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # 2. Vector Database (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ragmind-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  # 3. Message Broker (RabbitMQ)
  rabbitmq:
    image: rabbitmq:4.1.2-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: minirag_user
      RABBITMQ_DEFAULT_PASS: minirag_rabbitmq_2222
      RABBITMQ_DEFAULT_VHOST: minirag_vhost
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      timeout: 10s
      retries: 5

  # 4. Caching & Task Backend (Redis)
  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    restart: always
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "minirag_redis_2222" ]

  # 5. Backend (FastAPI)
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ragmind-backend:prod
    container_name: ragmind-backend
    env_file: .env
    environment: *app-environment
    depends_on: *app-depends-on
    volumes:
      - ./uploads:/app/uploads
    restart: always

  # 6. Celery Worker
  worker:
    image: ragmind-backend:prod
    container_name: ragmind-worker
    command: celery -A backend.celery_app worker --loglevel=info -Q default,file_processing
    env_file: .env
    environment:
      <<: *app-environment
    depends_on: *app-depends-on
    volumes:
      - ./uploads:/app/uploads
    restart: always

  # 7. Celery Scheduler
  scheduler:
    image: ragmind-backend:prod
    container_name: ragmind-scheduler
    command: celery -A backend.celery_app beat --loglevel=info --schedule=/app/uploads/celerybeat-schedule
    env_file: .env
    environment: *app-environment
    depends_on: *app-depends-on
    volumes:
      - ./uploads:/app/uploads
    restart: always

  # 8. Frontend (Next.js)
  frontend-next:
    build:
      context: .
      dockerfile: docker/next.Dockerfile
    image: ragmind-frontend-next:prod
    container_name: ragmind-frontend-next
    restart: always

  # 9. Reverse Proxy (Nginx)
  nginx:
    image: nginx:alpine
    container_name: ragmind-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend-next
    restart: always

volumes:
  postgres_data:
  qdrant_data:
  rabbitmq_data:
  redis_data:
